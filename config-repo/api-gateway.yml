server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: book-service
          uri: http://book-service:8081
          predicates:
            - Path=/book, /book/**
        - id: member-service
          uri: http://member-service:8082
          predicates:
            - Path=/members, /members/**
        - id: loan-service
          uri: http://loan-service:8083
          predicates:
            - Path=/loans, /loans/**

security:
  tokens:
    valid:
      - ${API_GATEWAY_TOKEN}

ratelimit:
  capacity: 10
  refill-tokens: 10
  refill-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health
