# Porta dedicata del microservizio Book
server.port=8081

# Database dedicato del microservizio Book
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/book_service_db
spring.datasource.username=librarian
spring.datasource.password=Libr@ry2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.web=DEBUG



# Nome del microservizio
spring.application.name=book-service


